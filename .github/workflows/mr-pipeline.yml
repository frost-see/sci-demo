name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  static-analysis:
    name: C/C++ Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=unusedFunction \
            --suppress=useStlAlgorithm \
            src/

  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Build for CodeQL
        run: cmake -B build && cmake --build build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Configure CMake with coverage flags
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage"

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture --directory build \
            --output-file coverage.info \
            --ignore-errors mismatch,gcov
          lcov --remove coverage.info \
            '/usr/*' '*/googletest/*' \
            --output-file coverage.info \
            --ignore-errors unused
          genhtml coverage.info --output-directory coverage-report
          lcov --list coverage.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/

  package:
    name: Package & Upload
    runs-on: ubuntu-latest
    needs: [ build, test ]

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Create package
        run: |
          mkdir -p dist/lib dist/include
          cp build/src/libsci_derivative.a dist/lib/
          cp build/src/libsci_curve_fit.a dist/lib/
          cp src/derivative.h dist/include/
          cp src/curve_fit.h dist/include/
          tar -czf sci-demo-${{ github.sha }}.tar.gz -C dist .

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: sci-demo-package
          path: sci-demo-*.tar.gz
